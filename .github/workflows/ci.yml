name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Lint
        run: |
          python -m py_compile src/json_dsl.py
          python -m py_compile main.py

      - name: Run tests
        run: python -m unittest test.test_json_dsl -v

      - name: Run CLI demo
        run: python main.py -d input.json -q 'users[age>25].name'
